name = "ccdiary"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Astro builds static assets into ./dist; the Worker is bundled separately by the adapter.
assets = { directory = "./dist", binding = "ASSETS" }

workers_dev = true
preview_urls = false
routes = [
    { pattern = "ccdiary.saqoo.sh", custom_domain = true }
]

# D1 database. Run `wrangler d1 create ccdiary`, then paste the database_id below.
# (Personal IDs are intentionally NOT committed to the public repo — the
# placeholder is replaced locally by `scripts/configure-wrangler.sh` or by
# the deployer following docs/WEB_DEPLOYMENT.md.)
[[d1_databases]]
binding = "DB"
database_name = "ccdiary"
database_id = "REPLACE_WITH_DATABASE_ID"

# Secrets are not declared here. Set with:
#   echo "$TOKEN" | wrangler secret put CCDIARY_INGEST_TOKEN

[observability]
enabled = true
